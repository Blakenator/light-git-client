name: Build/release

on:
  push:
    branches:
      - 'master'
      - 'testing/build'
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      # ──────────────────────────────────────────────────────
      # Code Signing (optional — uncomment when certs are set up)
      #
      # macOS: Requires Apple Developer Program ($99/yr).
      #   Set these repo secrets:
      #     MAC_CERTS            — Base64-encoded .p12 certificate
      #     MAC_CERTS_PASSWORD   — Password for the .p12 file
      #     APPLE_ID             — Apple ID email
      #     APPLE_ID_PASSWORD    — App-specific password
      #     APPLE_TEAM_ID        — Apple Developer Team ID
      #
      # Windows: Free for open source via SignPath.org.
      #   Set these repo secrets:
      #     WIN_CSC_LINK         — Base64-encoded .pfx certificate
      #     WIN_CSC_KEY_PASSWORD — Password for the .pfx file
      # ──────────────────────────────────────────────────────

      - name: Build, Package & Release (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: pnpm run release:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build, Package & Release (Windows)
        if: matrix.os == 'windows-latest'
        run: pnpm run release:windows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Uncomment when Windows code signing is configured:
          # WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          # WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Build, Package & Release (macOS)
        if: matrix.os == 'macos-latest'
        run: pnpm run release:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Uncomment when macOS code signing is configured:
          # CSC_LINK: ${{ secrets.MAC_CERTS }}
          # CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
